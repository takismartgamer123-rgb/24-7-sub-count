name: TAKI STREAM 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Start GOD STREAM
        env:
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_KEY }}
          CHANNEL_ID: UC4xLiPv0BtPUMR2CwzNWI5g # <<< بدل ID تاعك
          CHANNEL_NAME: "its taki!! 🇩🇿²⁴" # <<< بدل اسمك
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg jq fonts-dejavu-core fonts-noto-color-emoji
          
          while true; do
            SUBS=$(curl -s "https://api.socialcounts.org/youtube-live-subscriber-count/$CHANNEL_ID" | jq -r '.est_sub // "0"')
            UPTIME=$(date -u -d @$(($(date +%s) - $(date -d "$(git log -1 --format=%cI)" +%s))) +'%H:%M:%S')
            
            echo "GOD STREAM: $SUBS subs | Uptime: $UPTIME"
            
            # التصميم طبق الأصل من الصورة تاعك
            ffmpeg -f lavfi -i color=c=0x000000:s=1920x1080 -vf \
            "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='GOD STREAM - $CHANNEL_NAME':fontcolor=white:fontsize=36:x=120:y=80, \
             drawbox=x=100:y=140:w=280:h=70:color=0xff2d55@1:t=fill:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='LIVE 24/7':fontcolor=white:fontsize=32:x=140:y=158, \
             drawbox=x=400:y=140:w=180:h=70:color=white@0.1:t=fill:enable='between(t,0,99999)', \
             drawbox=x=400:y=140:w=180:h=70:color=0x00e5ff@1:t=4:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='يشاهد':fontcolor=white:fontsize=28:x=460:y=158, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='$CHANNEL_NAME':fontcolor=0x9b9bff:fontsize=42:x=(w-text_w)/2:y=h/2-100, \
             drawbox=x=(w-120)/2:y=h/2+20:w=120:h=120:color=0x00e5ff@0.3:t=80:enable='between(t,0,99999)', \
             drawbox=x=(w-100)/2:y=h/2+30:w=100:h=100:color=0x00e5ff@1:t=6:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='▶':fontcolor=0x00e5ff:fontsize=50:x=(w-text_w)/2:y=h/2+65, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='مشترك':fontcolor=white:fontsize=28:x=(w-text_w)/2:y=h/2+160, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='$SUBS':fontcolor=0x00e5ff:fontsize=80:x=(w-text_w)/2:y=h/2+200, \
             drawbox=x=w/2-350:y=h-200:w=200:h=60:color=0x00e5ff@0.15:t=fill:enable='between(t,0,99999)', \
             drawbox=x=w/2-350:y=h-200:w=200:h=60:color=0x00e5ff@1:t=3:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='تاريخ الإنشاء':fontcolor=white:fontsize=20:x=w/2-250:y=h-185, \
             drawbox=x=w/2-100:y=h-200:w=200:h=60:color=0x00e5ff@0.15:t=fill:enable='between(t,0,99999)', \
             drawbox=x=w/2-100:y=h-200:w=200:h=60:color=0x00e5ff@1:t=3:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='عدد الفيديوهات':fontcolor=white:fontsize=20:x=w/2-10:y=h-185, \
             drawbox=x=w/2+150:y=h-200:w=200:h=60:color=0x00e5ff@0.15:t=fill:enable='between(t,0,99999)', \
             drawbox=x=w/2+150:y=h-200:w=200:h=60:color=0x00e5ff@1:t=3:enable='between(t,0,99999)', \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='إجمالي المشاهدات':fontcolor=white:fontsize=20:x=w/2+240:y=h-185, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='UPTIME\: $UPTIME':fontcolor=0x555555:fontsize=18:x=w-200:y=h-40" \
            -frames:v 1 -y frame.jpg
            
            ffmpeg -re -loop 1 -i frame.jpg -f lavfi -i anullsrc=r=44100:cl=mono \
            -c:v libx264 -tune stillimage -preset ultrafast -pix_fmt yuv420p -r 1 -g 2 \
            -c:a aac -b:a 32k -shortest -t 60 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_KEY"
            
            sleep 2
          done
