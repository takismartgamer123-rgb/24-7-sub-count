name: GOD STREAM 24/7 WITH LIVE SUBS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      - name: Start GOD STREAM
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_KEY }}
          API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg jq fonts-dejavu-core

          while true; do
            # نجيبو عدد المشتركين من يوتيوب API الرسمي
            SUBS=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=$CHANNEL_ID&key=$API_KEY" | jq -r '.items[0].statistics.subscriberCount // "0"')

            # اذا فشل API نحطو 0 باه ما يحبسش البث
            if [ "$SUBS" == "null" ] || [ -z "$SUBS" ]; then
              SUBS="0"
            fi

            UPTIME=$(date -u -d @$(($(date +%s) - $(date -d "$(git log -1 --format=%cI)" +%s))) +'%H:%M:%S')
            echo "LIVE: $SUBS subscribers | Uptime: $UPTIME"

            # نخدمو صورة جديدة كل 5 دقايق بالعدد المحدث
            ffmpeg -f lavfi -i color=c=0x000000:s=1920x1080 -vf \
            "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='GOD STREAM - its taki!! 🇩🇿²⁴':fontcolor=white:fontsize=36:x=120:y=80, \
             drawbox=x=100:y=140:w=280:h=70:color=0xff2d55@1:t=fill, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='LIVE 24/7':fontcolor=white:fontsize=32:x=140:y=158, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='$CHANNEL_NAME':fontcolor=0x9b9bff:fontsize=42:x=(w-text_w)/2:y=h/2-100, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='مشترك':fontcolor=white:fontsize=28:x=(w-text_w)/2:y=h/2+160, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='$SUBS':fontcolor=0x00e5ff:fontsize=80:x=(w-text_w)/2:y=h/2+200, \
             drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='UPTIME\: $UPTIME':fontcolor=0x555555:fontsize=18:x=w-200:y=h-40" \
            -frames:v 1 -y frame.jpg

            # نشعلو البث لمدة 5 دقايق بالصورة الجديدة
            timeout 295 ffmpeg -re -loop 1 -i frame.jpg -f lavfi -i anullsrc=r=44100:cl=mono \
            -c:v libx264 -tune stillimage -preset ultrafast -pix_fmt yuv420p -r 1 -g 2 \
            -c:a aac -b:a 32k -shortest \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" || true

            sleep 5
          done
