name: Taki Stream DZ 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl jq fontconfig fonts-dejavu-core fonts-noto-color-emoji imagemagick
          mkdir -p ~/.fonts
          curl -L "https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf" -o ~/.fonts/NotoColorEmoji.ttf
          fc-cache -f -v
          curl -L "${{ secrets.LOGO_URL }}" -o logo.png || convert -size 100x100 xc:transparent logo.png
          convert logo.png -resize 100x100 logo.png || true
      - name: Stream 24/7  
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          NEWS=(
          "عاجل: مواطن لقى 50 دج في سروال قديم، راه يخمم يشري بيها قناة يوتيوب"
          "دراسة: 99% من الجزائريين يضغطو على تخطي الاعلان قبل ما يبدا"
          "خبر مفرح: الباتري تاعك تكمل يوم كامل اذا ما حلتش فيسبوك"
          "تنبيه: كي يقولك صاحبك نعيطلك بعد 5 دقايق = ما راحش يعيط"
          "عاجل: واحد عطس في الدار، سمعوه الجيران في الحومة اللي بعدها"
          "دراسة: المشترك اللي ما يفعلش الجرس هو نفسو اللي يقول ما لحقنيش"
          "خبر: جماعة الكونيكسيون الضعيفة راهم يحملو البث تاعنا 2019"
          "عاجل: كوكب الارض يطلب من سونلغاز تخفف عليه شوية"
          "دراسة: كلمة راني جاي عند الجزائري = مزال ما خرجش من الدار"
          "خبر: واحد شرى تيليفون جديد باه يصور بيه التيليفون القديم"
          )
          MOTIVATION=(
          "ما تستناش الوقت المناسب، دير لايك ضرك"
          "الـ 1K الاولى صعيبة، من بعد تولي ساهلة معاكم"
          "كل اشتراك = خطوة لقدام، كل لايك = دفعة للسماء"
          "قالو النجاح ما يجيش وحدو، يجي مع جماعة كيفكم"
          "اضرب اشتراك وخلي الباقي علينا حنا والزهر"
          "اليوم متابع، غدوا انت المول"
          "من الصفر بدينا، للقمة رايحين بيكم"
          "اضغط الجرس، باه ما تقولش ما علاباليش"
          "انت السبة اللي مخلية البث هذا شاعل"
          "احلم كبير، واشترك اكبر"
          )
          CURRENT_NEWS="مرحبا بيكم في بث تاكي"
          CURRENT_MOTIV="اضغط لايك اذا راك معانا"
          STATS_JSON=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=$YOUTUBE_CHANNEL_ID&key=$YOUTUBE_API_KEY")
          SUBS=$(echo "$STATS_JSON" | jq -r '.items[0].statistics.subscriberCount // "0"')
          VIEWS=$(echo "$STATS_JSON" | jq -r '.items[0].statistics.viewCount // "0"')
          GOAL=5000
          LEFT=$((GOAL - SUBS))
          [ $LEFT -lt 0 ] && LEFT=0
          PERCENT=$((SUBS * 100 / GOAL))
          [ $PERCENT -gt 100 ] && PERCENT=100
          BAR_WIDTH=$((800 * PERCENT / 100))
          while true; do
            if (( SECONDS % 180 < 5 )); then
              CURRENT_NEWS=${NEWS[$RANDOM % ${#NEWS[@]}]}
              CURRENT_MOTIV=${MOTIVATION[$RANDOM % ${#MOTIVATION[@]}]}
              if (( SECONDS % 3600 < 5 )); then
                STATS_JSON=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=$YOUTUBE_CHANNEL_ID&key=$YOUTUBE_API_KEY")
                SUBS=$(echo "$STATS_JSON" | jq -r '.items[0].statistics.subscriberCount // "0"')
                VIEWS=$(echo "$STATS_JSON" | jq -r '.items[0].statistics.viewCount // "0"')
                LEFT=$((GOAL - SUBS))
                [ $LEFT -lt 0 ] && LEFT=0
                PERCENT=$((SUBS * 100 / GOAL))
                [ $PERCENT -gt 100 ] && PERCENT=100
                BAR_WIDTH=$((800 * PERCENT / 100))
              fi
            fi
            ping -c 1 8.8.8.8 >/dev/null 2>&1 || { echo "No internet, waiting..."; sleep 10; continue; }
            ffmpeg -re -f lavfi -i "color=c=0x0a0a0a:s=1920x1080:r=1" \
            -i logo.png \
            -filter_complex "
            [1]scale=100:100;[0]overlay=W-w-50:50,
            drawbox=x=0:y=0:w=1920:h=180:color=0x4a00e0@0.9:t=fill,
            drawtext=text='🟢 LIVE':fontcolor=0x00ff88:fontsize=48:x=80:y=65,
            drawtext=text='بث تاكي الرسمي 24/7':fontcolor=white:fontsize=55:x=300:y=60,
            drawtext=text='%{localtime}':fontcolor=0xffd700:fontsize=40:x=W-tw-80:y=70,
            drawbox=x=60:y=220:w=900:h=800:color=0x1a1a2e@0.85:t=fill,
            drawbox=x=60:y=220:w=900:h=80:color=0x00f5ff@1:t=fill,
            drawtext=text='📊 احصائيات القناة':fontcolor=0x0a0a0a:fontsize=45:x=100:y=235,
            drawtext=text='Taki':fontcolor=0x00f5ff:fontsize=60:x=100:y=350,
            drawtext=text='المشتركين':fontcolor=white:fontsize=35:x=100:y=430,
            drawtext=text='$SUBS':fontcolor=0xff0080:fontsize=90:x=100:y=480,
            drawtext=text='🎯 الهدف: $GOAL':fontcolor=white:fontsize=35:x=100:y=620,
            drawbox=x=100:y=680:w=800:h=40:color=0x333333@1:t=fill,
            drawbox=x=100:y=680:w=$BAR_WIDTH:h=40:color=0x00ff88@1:t=fill,
            drawtext=text='$PERCENT%':fontcolor=white:fontsize=30:x=480:y=685,
            drawtext=text='باقي $LEFT للهدف':fontcolor=0xffd700:fontsize=35:x=100:y=750,
            drawtext=text='👁️ $VIEWS مشاهدة':fontcolor=0x00f5ff:fontsize=35:x=100:y=820,
            drawbox=x=1040:y=200:w=800:h=650:color=0x1a1a2e@0.85:t=fill,
            drawbox=x=1040:y=200:w=800:h=80:color=0xff0080@1:t=fill,
            drawtext=text='📰 اخبار DZ المضحكة':fontcolor=white:fontsize=45:x=1100:y=215,
            drawtext=text='$CURRENT_NEWS':fontcolor=white:fontsize=30:x=1080:y=320:max_glyphs=40,
            drawbox=x=1080:y=500:w=720:h=5:color=0x4a00e0@1:t=fill,
            drawtext=text='💪 جرعة تحفيز:':fontcolor=0x00ff88:fontsize=35:x=1080:y=540,
            drawtext=text='$CURRENT_MOTIV':fontcolor=white:fontsize=30:x=1080:y=600:max_glyphs=40,
            drawtext=text='دير لايك 😂 | كومنت 🔥':fontcolor=0xaaaaaa:fontsize=30:x=1080:y=750,
            drawbox=x=0:y=1020:w=1920:h=60:color=0x4a00e0@0.9:t=fill,
            drawtext=text='🧠 لغز تاكي: ما هو الشيء الذي كلما زاد نقص؟':fontcolor=white:fontsize=35:x=100:y=1035,
            drawtext=text='جاوب في الكومنت | لغز جديد كل 30 دقيقة':fontcolor=0xffd700:fontsize=28:x=100:y=1035+40
            " \
            -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -r 1 -g 2 -b:v 1000k \
            -c:a aac -b:a 32k -ar 44100 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY" || true
            sleep 30
          done
