name: Taki Stream DZ 24/7 (improved)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: stream-24-7
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment and dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg curl jq fontconfig fonts-dejavu-core imagemagick
          mkdir -p "$HOME/.fonts" /tmp/stream-overlay

          # Download emoji + Arabic font to ensure Arabic text renders correctly
          curl -fsSL "https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf" -o "$HOME/.fonts/NotoColorEmoji.ttf" || true
          curl -fsSL "https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoNaskhArabic/NotoNaskhArabic-Regular.ttf" -o "$HOME/.fonts/NotoNaskhArabic-Regular.ttf" || true

          fc-cache -f -v || true

          # Download channel logo if secret provided
          if [ -n "${{ secrets.LOGO_URL }}" ]; then
            curl -fsSL "${{ secrets.LOGO_URL }}" -o logo.png || touch logo.png
          else
            touch logo.png
          fi
          convert logo.png -resize 100x100 logo.png || true

      - name: Run streaming controller
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          set -euo pipefail

          # Fail fast if required secrets are missing (do not print secret values)
          missing=false
          for v in YOUTUBE_STREAM_KEY YOUTUBE_API_KEY YOUTUBE_CHANNEL_ID; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required secret: $v"
              missing=true
            else
              echo "$v is set (non-empty)"
            fi
          done
          if [ "$missing" = true ]; then
            echo "One or more required secrets are missing. Add them at Settings → Secrets and variables → Actions, or run this workflow from the main repository where secrets are available."
            exit 1
          fi

          # STREAM_DURATION controls how long this workflow run attempts to stream (seconds)
          # Keep this below the job timeout (360 minutes here). Default: 6 hours
          STREAM_DURATION=$((6 * 60 * 60))
          START_TS=$SECONDS

          # Launch the helper script from the repository which manages overlays and ffmpeg
          chmod +x .github/scripts/streamctl.sh
          ./.github/scripts/streamctl.sh "$STREAM_DURATION"
